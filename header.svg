<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        .header-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 200px;
          font-family: 'Press Start 2P', monospace;
          background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
          border-radius: 16px;
          border: 2px solid #30363d;
        }
        .gradient-text {
          font-size: 28px;
          font-weight: bold;
          background: linear-gradient(90deg, #00ff00, #00ffff, #ff00ff);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
          from { text-shadow: 0 0 10px #00ff00; }
          to { text-shadow: 0 0 30px #ff00ff; }
        }
        .subtitle {
          color: #8b949e;
          font-size: 14px;
          margin-top: 20px;
          letter-spacing: 2px;
        }
        .easter-egg {
          color: #0d1117;
          background: #0d1117;
          font-size: 10px;
          margin-top: 10px;
          user-select: none;
        }
        .easter-egg::selection {
          color: #00ff00;
          background: #161b22;
        }
      </style>
      <div class="header-container">
        <div class="gradient-text">HubbaBubbaPrepod</div>
        <div class="subtitle">✦ Full-Stack Developer ✦</div>
        <!-- Пасхалка: текст, видимый только при выделении -->
        <div class="easter-egg">🎉 You found the hidden message! Welcome to the club! 🎉</div>
      </div>
    </div>
  </foreignObject>
</svg>
