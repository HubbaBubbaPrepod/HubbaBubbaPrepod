<svg fill="none" viewBox="0 0 600 250" width="600" height="250" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&amp;display=swap');
        .terminal {
          background: #1a1b26;
          border-radius: 12px;
          padding: 20px;
          font-family: 'Fira Code', monospace;
          border: 1px solid #565f89;
          box-shadow: 0 0 30px rgba(86, 95, 137, 0.3);
          height: 100%;
          box-sizing: border-box;
        }
        .terminal-header {
          display: flex;
          gap: 8px;
          margin-bottom: 15px;
        }
        .terminal-btn { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .terminal-content {
          color: #a9b1d6;
          font-size: 13px;
          line-height: 1.6;
        }
        .prompt { color: #9ece6a; }
        .command { color: #7dcfff; }
        .output { color: #c0caf5; margin-left: 10px; }
        .cursor {
          display: inline-block;
          width: 8px;
          height: 16px;
          background: #c0caf5;
          animation: blink 1s infinite;
          margin-left: 4px;
        }
        @keyframes blink {
          0%, 50% { opacity: 1; }
          51%, 100% { opacity: 0; }
        }
        .typing {
          overflow: hidden;
          white-space: nowrap;
          animation: typing 3s steps(40, end);
        }
        @keyframes typing {
          from { width: 0; }
          to { width: 100%; }
        }
      </style>
      <div class="terminal">
        <div class="terminal-header">
          <div class="terminal-btn red"></div>
          <div class="terminal-btn yellow"></div>
          <div class="terminal-btn green"></div>
        </div>
        <div class="terminal-content">
          <div><span class="prompt">hubba@github</span>:<span class="command">~</span>$ neofetch</div>
          <div class="output">           .-.-.   hubba@github</div>
          <div class="output">      .-.-.   OS: GitHub Profile</div>
          <div class="output">      Shell: Bash 5.2</div>
          <div class="output">      Languages: Rust, Python, JS</div>
          <div class="output">      Repos: 42 | Stars: 1337</div>
          <div><span class="prompt">hubba@github</span>:<span class="command">~</span>$ <span class="cursor"></span></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
