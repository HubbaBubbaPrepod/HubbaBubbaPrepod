# .github/workflows/3d-contrib.yml
name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 1 * * *" # Запускать каждый день в 01:00 UTC
  workflow_dispatch: # Позволяет запускать вручную

# Добавляем разрешения для GITHUB_TOKEN (на всякий случай) и используем GH_TOKEN для push
permissions:
  contents: write   # Разрешаем запись в содержимое репозитория

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}   # <-- Важно: используем ваш персональный токен для checkout
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }} # Используем созданный ранее секрет
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "generated 3d contribution graph" || exit 0
          git push
