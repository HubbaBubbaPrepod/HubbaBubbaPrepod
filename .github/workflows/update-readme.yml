name: Update README

on:
  schedule:
    - cron: '0 0 * * *'  # каждый день в полночь UTC
  workflow_dispatch:       # можно запустить вручную

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update skill progress bars
        run: |
          # Генерация прогресс-баров (можно заменить на API-запрос к skill-progress)
          SKILLS="
          Rust|85
          Python|80
          JavaScript|75
          TypeScript|70
          C++|65
          "
          
          SKILLS_SECTION="### 📊 Навыки и прогресс\n"
          while IFS='|' read -r skill level; do
            filled=$((level / 5))
            empty=$((20 - filled))
            bar=$(printf "%${filled}s" | tr ' ' '█')
            bar="${bar}$(printf "%${empty}s" | tr ' ' '░')"
            SKILLS_SECTION="${SKILLS_SECTION}[${bar}] ${skill} (${level}%)\n"
          done <<< "$SKILLS"
          
          sed -i "/<!-- SKILLS:START -->/,/<!-- SKILLS:END -->/c\<!-- SKILLS:START -->\n${SKILLS_SECTION}\n<!-- SKILLS:END -->" README.md

      - name: Update goals progress
        run: |
          GOALS_SECTION="### 🎯 Цели на 2026\n"
          GOALS_SECTION="${GOALS_SECTION}- [x] Изучить Rust на продвинутом уровне ✅\n"
          GOALS_SECTION="${GOALS_SECTION}- [x] Внести вклад в 5 Open Source проектов ✅\n"
          GOALS_SECTION="${GOALS_SECTION}- [ ] Написать 10 технических статей (6/10)\n"
          GOALS_SECTION="${GOALS_SECTION}- [ ] Пройти курс по машинному обучению (30%)\n"
          GOALS_SECTION="${GOALS_SECTION}- [ ] Создать свой первый компилятор (0%)\n"
          
          sed -i "/<!-- GOALS:START -->/,/<!-- GOALS:END -->/c\<!-- GOALS:START -->\n${GOALS_SECTION}\n<!-- GOALS:END -->" README.md

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "Update skills and goals" || exit 0
          git push
