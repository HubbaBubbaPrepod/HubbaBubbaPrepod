name: Update Repository Tree

on:
  schedule:
    - cron: "0 4 * * *" # Запускается каждый день в 04:00 UTC
  workflow_dispatch:     # Можно запустить вручную

jobs:
  update-tree:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Inject directory tree
        uses: euberdeveloper/ga-dree@main
        with:
          targetPath: "./README.md" # Файл для обновления
          comment: "dree"            # Маркер для вставки дерева
          root: "./"                 # Корневая папка (весь профильный репозиторий)
          exclude: ".git"            # Исключаем служебную папку .git

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory tree (automated)"
          branch: main
